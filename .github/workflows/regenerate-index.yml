name: Regenerate Index

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - '**.htm'
      - 'generate-index.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate files.js
        run: node generate-index.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain files.js)" ]]; then
            git add files.js
            git commit -m "chore: regenerate index [skip ci]"
            git push
          else
            echo "No changes to files.js"
          fi
