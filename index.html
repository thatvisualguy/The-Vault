<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Vault — HTML Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --ink: #0a0a0a;
    --dim: #6b6b6b;
    --rule: #0a0a0a;
    --accent: #d4351c;
    --hover: #ebe7dd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    padding: 48px 32px 80px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* === HEADER === */
  header {
    border-bottom: 2px solid var(--rule);
    padding-bottom: 24px;
    margin-bottom: 48px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(48px, 8vw, 96px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    font-style: italic;
  }

  .masthead .sub {
    color: var(--dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 12px;
  }

  .meta {
    text-align: right;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .meta .count {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 56px;
    color: var(--ink);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  /* === SEARCH === */
  .search-wrap {
    margin-bottom: 32px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-wrap::before {
    content: "→";
    font-family: 'Fraunces', serif;
    font-size: 20px;
  }

  #search {
    border: none;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    width: 100%;
    color: var(--ink);
    outline: none;
    padding: 4px 0;
  }

  #search::placeholder {
    color: var(--dim);
    font-style: italic;
  }

  /* === LIST === */
  .file-list {
    list-style: none;
  }

  .file-item {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 20px 16px;
    border-bottom: 1px solid rgba(10, 10, 10, 0.15);
    cursor: pointer;
    transition: background 0.15s ease, padding-left 0.2s ease;
    text-decoration: none;
    color: var(--ink);
  }

  .file-item:hover {
    background: var(--hover);
    padding-left: 24px;
  }

  .file-item:hover .arrow {
    transform: translateX(8px);
    color: var(--accent);
  }

  .num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--dim);
  }

  .file-item:hover .num {
    color: var(--accent);
  }

  .name {
    font-size: 16px;
    font-weight: 600;
  }

  .filename {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
    text-transform: lowercase;
  }

  .arrow {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    color: var(--dim);
    transition: transform 0.2s ease, color 0.2s ease;
  }

  /* === EMPTY === */
  .empty {
    padding: 80px 16px;
    text-align: center;
    color: var(--dim);
    font-style: italic;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    display: none;
  }

  /* === FOOTER === */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 2px solid var(--rule);
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--ink);
  }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    body { padding: 32px 20px 60px; }
    header { grid-template-columns: 1fr; }
    .meta { text-align: left; }
    .file-item { grid-template-columns: 40px 1fr auto; gap: 16px; padding: 16px 8px; }
    .num { font-size: 22px; }
    .name { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="masthead">
    <h1>The Vault.</h1>
    <div class="sub">An archive of HTML files · Est. <span id="year"></span></div>
  </div>
  <div class="meta">
    <span class="count" id="count">0</span>
    entries on file
  </div>
</header>

<div class="search-wrap">
  <input id="search" type="text" placeholder="filter the archive…" autocomplete="off" />
</div>

<ul class="file-list" id="list"></ul>
<div class="empty" id="empty">— nothing matches —</div>

<footer>
  <span>Static index · github pages</span>
  <span>Add files: <code style="font-family:inherit">git push</code></span>
</footer>

<!-- Generated file manifest. Auto-built by generate-index.js -->
<script src="files.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('count');
  const search = document.getElementById('search');

  // FILES variable comes from files.js
  const files = (typeof FILES !== 'undefined') ? FILES : [];

  function pretty(name) {
    return name
      .replace(/\.html?$/i, '')
      .replace(/[-_]+/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function render(filter = '') {
    const f = filter.toLowerCase().trim();
    const filtered = files.filter(file =>
      file.toLowerCase().includes(f) || pretty(file).toLowerCase().includes(f)
    );

    list.innerHTML = '';
    countEl.textContent = String(filtered.length).padStart(2, '0');

    if (filtered.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    filtered.forEach((file, i) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = file;
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'file-item';
      a.innerHTML = `
        <span class="num">${String(i + 1).padStart(2, '0')}</span>
        <span>
          <div class="name">${pretty(file)}</div>
          <div class="filename">${file}</div>
        </span>
        <span class="arrow">↗</span>
      `;
      li.appendChild(a);
      list.appendChild(li);
    });
  }

  search.addEventListener('input', e => render(e.target.value));
  render();
</script>

</body>
</html>
