<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#FFF4E0"/>
<title>Pictionary Word Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF4E0;
    --ink:#1A1A1A;
    --pink:#FF4D8D;
    --yellow:#FFD23F;
    --blue:#3D5AFE;
    --green:#2ECC71;
    --purple:#9B59B6;
    --cream:#FFFBF0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Fraunces',serif;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,77,141,0.08) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(61,90,254,0.08) 0, transparent 40%);
    color:var(--ink);
    min-height:100vh;
    padding:20px 16px 80px;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    pointer-events:none;
    opacity:0.4;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.15'/></svg>");
    z-index:0;
  }
  .wrap{
    position:relative;
    z-index:1;
    max-width:520px;
    margin:0 auto;
  }

  header{
    text-align:center;
    margin-bottom:24px;
  }
  .kicker{
    display:inline-block;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    background:var(--ink);
    color:var(--yellow);
    padding:6px 12px;
    transform:rotate(-2deg);
    margin-bottom:10px;
  }
  h1{
    font-family:'Bungee',cursive;
    font-size:clamp(34px,10vw,52px);
    line-height:0.95;
    letter-spacing:-0.02em;
    text-transform:uppercase;
  }
  h1 .accent{color:var(--pink);display:inline-block;transform:rotate(-3deg)}
  h1 .accent2{color:var(--blue);display:inline-block;transform:rotate(2deg)}
  .sub{
    font-style:italic;
    font-size:14px;
    margin-top:6px;
    opacity:0.7;
  }

  .label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    opacity:0.6;
    margin-bottom:10px;
    display:block;
  }

  .cats{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-bottom:22px;
  }
  .chip{
    font-family:'Bungee',cursive;
    font-size:13px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:16px 8px;
    border:3px solid var(--ink);
    background:var(--cream);
    color:var(--ink);
    cursor:pointer;
    box-shadow:4px 4px 0 var(--ink);
    text-align:center;
    min-height:54px;
    transition:transform 0.08s, box-shadow 0.08s, background 0.15s;
  }
  .chip:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
  .chip.active{background:var(--ink);color:var(--yellow)}
  .chip[data-cat="objects"].active{background:var(--pink);color:var(--cream)}
  .chip[data-cat="animals"].active{background:var(--green);color:var(--cream)}
  .chip[data-cat="actions"].active{background:var(--blue);color:var(--cream)}
  .chip[data-cat="food"].active{background:var(--yellow);color:var(--ink)}
  .chip[data-cat="places"].active{background:var(--purple);color:var(--cream)}
  .chip[data-cat="sports"].active{background:#FF6B35;color:var(--cream)}
  .chip[data-cat="movies"].active{background:#E63946;color:var(--cream)}
  .chip[data-cat="jobs"].active{background:#1D7874;color:var(--cream)}
  .chip[data-cat="nature"].active{background:#588157;color:var(--cream)}
  .chip[data-cat="random"].active{background:var(--ink);color:var(--yellow)}

  .diff-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:24px;
  }
  .diff{
    border:3px solid var(--ink);
    background:var(--cream);
    padding:12px 8px;
    cursor:pointer;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    box-shadow:3px 3px 0 var(--ink);
    transition:all 0.1s;
    min-height:44px;
  }
  .diff:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .diff.active{background:var(--ink);color:var(--yellow)}

  .card{
    position:relative;
    background:var(--cream);
    border:4px solid var(--ink);
    box-shadow:8px 8px 0 var(--ink);
    padding:44px 20px 28px;
    min-height:220px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    margin-bottom:20px;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:12px;left:12px;right:12px;bottom:12px;
    border:1.5px dashed var(--ink);
    pointer-events:none;
    opacity:0.4;
  }
  .card-tag{
    position:absolute;
    top:-14px;
    left:20px;
    background:var(--ink);
    color:var(--cream);
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    padding:5px 10px;
  }
  .word{
    font-family:'Bungee',cursive;
    font-size:clamp(34px,9vw,48px);
    line-height:1;
    letter-spacing:-0.01em;
    word-break:break-word;
    text-transform:uppercase;
  }
  .word.empty{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:400;
    font-size:20px;
    text-transform:none;
    letter-spacing:0;
    opacity:0.5;
  }
  .word.hidden-word{
    letter-spacing:0.4em;
    opacity:0.4;
  }
  .stamp{
    margin-top:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    opacity:0.55;
  }
  .pop{animation:pop 0.5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{
    0%{transform:scale(0.6) rotate(-6deg);opacity:0}
    60%{transform:scale(1.08) rotate(2deg);opacity:1}
    100%{transform:scale(1) rotate(0);opacity:1}
  }

  .actions{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    margin-bottom:14px;
  }
  .btn{
    font-family:'Bungee',cursive;
    font-size:20px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:22px 16px;
    background:var(--pink);
    color:var(--cream);
    border:4px solid var(--ink);
    cursor:pointer;
    box-shadow:6px 6px 0 var(--ink);
    transition:transform 0.08s,box-shadow 0.08s,background 0.15s;
    min-height:64px;
  }
  .btn:active{transform:translate(4px,4px);box-shadow:2px 2px 0 var(--ink)}
  .btn-icon{
    width:64px;
    background:var(--cream);
    color:var(--ink);
    font-size:22px;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .meta{
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    opacity:0.55;
    margin-bottom:18px;
  }

  .section-divider{
    text-align:center;
    margin:28px 0 18px;
    position:relative;
  }
  .section-divider::before,
  .section-divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:28%;
    height:2px;
    background:var(--ink);
    opacity:0.2;
  }
  .section-divider::before{left:0}
  .section-divider::after{right:0}
  .section-divider span{
    font-family:'Bungee',cursive;
    font-size:14px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    background:var(--bg);
    padding:0 14px;
  }

  .player-controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
    gap:8px;
  }
  .count-pill{
    display:flex;
    align-items:center;
    border:3px solid var(--ink);
    background:var(--cream);
    box-shadow:3px 3px 0 var(--ink);
  }
  .count-pill button{
    width:42px;
    height:44px;
    border:none;
    background:transparent;
    font-family:'Bungee',cursive;
    font-size:20px;
    cursor:pointer;
  }
  .count-pill button:active{background:var(--yellow)}
  .count-pill .num{
    font-family:'Bungee',cursive;
    font-size:13px;
    min-width:54px;
    text-align:center;
    border-left:2px solid var(--ink);
    border-right:2px solid var(--ink);
    padding:12px 4px;
    line-height:1;
  }
  .reset-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    padding:12px 14px;
    background:var(--cream);
    color:var(--ink);
    border:3px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    cursor:pointer;
    min-height:44px;
  }
  .reset-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

  .players{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
  }
  .player{
    position:relative;
    display:grid;
    grid-template-columns:8px 1fr 38px 44px 38px;
    gap:8px;
    align-items:center;
    background:var(--cream);
    border:3px solid var(--ink);
    box-shadow:4px 4px 0 var(--ink);
    padding:10px 12px;
  }
  .player.leader{background:var(--yellow)}
  .player-color{
    width:8px;
    height:36px;
    background:var(--pink);
  }
  .player[data-i="0"] .player-color{background:var(--pink)}
  .player[data-i="1"] .player-color{background:var(--blue)}
  .player[data-i="2"] .player-color{background:var(--green)}
  .player[data-i="3"] .player-color{background:var(--purple)}
  .player-name{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:16px;
    background:transparent;
    border:none;
    border-bottom:2px dashed transparent;
    padding:6px 4px;
    width:100%;
    min-width:0;
    outline:none;
  }
  .player-name:focus{border-bottom-color:var(--ink)}
  .score-btn{
    width:38px;
    height:38px;
    border:2px solid var(--ink);
    background:var(--cream);
    font-family:'Bungee',cursive;
    font-size:18px;
    cursor:pointer;
    line-height:1;
    padding:0;
  }
  .score-btn:active{background:var(--yellow)}
  .score-btn.minus{background:#f5f5f5}
  .score{
    font-family:'Bungee',cursive;
    font-size:22px;
    text-align:center;
    line-height:1;
  }
  .crown{
    position:absolute;
    top:-12px;
    right:6px;
    font-size:18px;
    transform:rotate(12deg);
  }

  footer{
    margin-top:36px;
    text-align:center;
    font-style:italic;
    font-size:13px;
    opacity:0.5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="kicker">★ Party Edition ★</div>
      <h1><span class="accent">Picti</span><span class="accent2">onary</span><br/>Word Box</h1>
      <p class="sub">Pick a category. Smash the button. Start drawing.</p>
    </header>

    <span class="label">Category</span>
    <div class="cats" id="cats">
      <button class="chip active" data-cat="random">🎲 Random</button>
      <button class="chip" data-cat="objects">📦 Objects</button>
      <button class="chip" data-cat="animals">🐙 Animals</button>
      <button class="chip" data-cat="actions">🏃 Actions</button>
      <button class="chip" data-cat="food">🍕 Food</button>
      <button class="chip" data-cat="places">🗺️ Places</button>
      <button class="chip" data-cat="sports">⚽ Sports</button>
      <button class="chip" data-cat="movies">🎬 Movies</button>
      <button class="chip" data-cat="jobs">👷 Jobs</button>
      <button class="chip" data-cat="nature">🌿 Nature</button>
    </div>

    <span class="label">Difficulty</span>
    <div class="diff-row">
      <button class="diff" data-diff="easy">Easy</button>
      <button class="diff active" data-diff="medium">Medium</button>
      <button class="diff" data-diff="hard">Hard</button>
    </div>

    <div class="card">
      <div class="card-tag" id="cardTag">Random</div>
      <div class="word empty" id="wordOut">Tap below to start</div>
      <div class="stamp" id="stamp"></div>
    </div>

    <div class="actions">
      <button class="btn" id="genBtn">↯ New Word</button>
      <button class="btn btn-icon" id="hideBtn" aria-label="Hide word">👁️</button>
    </div>
    <div class="meta" id="meta">Round 0</div>

    <div class="section-divider"><span>Scoreboard</span></div>

    <div class="player-controls">
      <div class="count-pill">
        <button id="lessPlayers" aria-label="Fewer players">−</button>
        <div class="num"><span id="playerCount">2</span> P</div>
        <button id="morePlayers" aria-label="More players">+</button>
      </div>
      <button class="reset-btn" id="resetBtn">↺ Reset Scores</button>
    </div>

    <div class="players" id="players"></div>

    <footer>Draw it. Don't say it. Good luck.</footer>
  </div>

<script>
const WORDS = {
  objects: {
    easy: ["chair","book","cup","clock","ball","spoon","key","hat","umbrella","door","ladder","sock","brush","candle","pillow","balloon","kite","bell","shoe","fork"],
    medium: ["telescope","compass","globe","lighthouse","trampoline","piano","camera","binoculars","skateboard","hammock","chandelier","wheelbarrow","mailbox","tripod","drawer","blender","fan","lantern","paintbrush","calculator"],
    hard: ["sundial","gyroscope","kaleidoscope","abacus","gargoyle","monocle","periscope","corkscrew","stethoscope","metronome","easel","barometer","quill","sextant","prism","hourglass","unicycle","accordion","catapult","loom"]
  },
  animals: {
    easy: ["cat","dog","fish","cow","duck","pig","frog","bee","snake","horse","sheep","mouse","rabbit","bird","ant","spider","shark","bear","owl","crab"],
    medium: ["octopus","kangaroo","penguin","giraffe","dolphin","squirrel","raccoon","peacock","hedgehog","flamingo","jellyfish","walrus","panda","zebra","koala","seahorse","ostrich","beaver","chameleon","crocodile"],
    hard: ["narwhal","platypus","axolotl","tapir","aardvark","capybara","pangolin","quokka","wombat","manatee","sloth","lemur","okapi","echidna","cassowary","mandrill","tarantula","dugong","mongoose","armadillo"]
  },
  actions: {
    easy: ["jump","run","sleep","eat","laugh","dance","cry","read","sing","swim","kick","throw","wave","hug","clap","yawn","sneeze","kiss","walk","drink"],
    medium: ["juggle","tiptoe","wrestle","skate","gallop","whisper","stretch","balance","tickle","sweep","crawl","fishing","painting","knitting","gardening","cooking","skiing","surfing","climbing","stargazing"],
    hard: ["meditate","procrastinate","negotiate","camouflage","levitate","interrogate","choreograph","decipher","eavesdrop","ponder","improvise","reminisce","brainstorm","celebrate","hesitate","investigate","mourning","saluting","apologizing","hypnotize"]
  },
  food: {
    easy: ["pizza","apple","cake","banana","egg","bread","cheese","milk","cookie","carrot","grapes","corn","ice cream","soup","fries","burger","donut","rice","taco","pie"],
    medium: ["sushi","spaghetti","pancake","popcorn","sandwich","cupcake","watermelon","pineapple","lollipop","pretzel","croissant","waffle","dumpling","meatball","muffin","yogurt","peanut","kebab","omelette","milkshake"],
    hard: ["bruschetta","ratatouille","quiche","gnocchi","tiramisu","macaron","baklava","goulash","ceviche","paella","tempura","escargot","crepe","souffle","gazpacho","empanada","kimchi","fondue","risotto","focaccia"]
  },
  places: {
    easy: ["house","beach","park","school","farm","castle","cave","forest","store","zoo","kitchen","bedroom","garden","library","gym","bridge","road","pool","tent","barn"],
    medium: ["airport","aquarium","volcano","desert","jungle","temple","skyscraper","stadium","lighthouse","cinema","carnival","graveyard","greenhouse","mountain","windmill","factory","laboratory","arcade","glacier","harbor"],
    hard: ["pyramid","colosseum","observatory","amphitheater","catacombs","planetarium","sphinx","aqueduct","oasis","tundra","fjord","monastery","savanna","metropolis","mausoleum","chasm","plateau","peninsula","archipelago","megalopolis"]
  },
  sports: {
    easy: ["soccer","basketball","tennis","baseball","golf","boxing","swimming","running","skating","biking","hiking","yoga","bowling","skiing","surfing","fishing","football","volleyball","ping pong","hockey"],
    medium: ["cricket","rugby","badminton","archery","gymnastics","karate","judo","wrestling","cheerleading","sailing","rowing","javelin","high jump","long jump","trampoline","figure skating","snowboarding","kayaking","fencing","handball"],
    hard: ["lacrosse","curling","biathlon","decathlon","luge","bobsled","equestrian","triathlon","pole vault","shot put","water polo","synchronized swimming","kitesurfing","parkour","quidditch","croquet","jai alai","sepak takraw","capoeira","bocce"]
  },
  movies: {
    easy: ["batman","superman","spiderman","frozen","shrek","minions","cars","toy story","star wars","jaws","rocky","tarzan","mulan","aladdin","hulk","barbie","up","wall-e","ratatouille","monsters inc"],
    medium: ["titanic","gladiator","jurassic park","godfather","matrix","avatar","inception","wizard of oz","mary poppins","jumanji","ghostbusters","beetlejuice","grease","scream","saw","alien","predator","terminator","rambo","top gun"],
    hard: ["pulp fiction","casablanca","goodfellas","scarface","memento","whiplash","interstellar","oppenheimer","parasite","la la land","birdman","fargo","trainspotting","clockwork orange","apocalypse now","blade runner","dr strangelove","schindlers list","citizen kane","amelie"]
  },
  jobs: {
    easy: ["doctor","teacher","chef","police","farmer","baker","clown","pilot","singer","painter","dancer","nurse","writer","driver","plumber","barber","waiter","actor","fisher","mailman"],
    medium: ["dentist","lawyer","scientist","mechanic","architect","carpenter","firefighter","photographer","journalist","sculptor","magician","conductor","gardener","librarian","veterinarian","detective","astronaut","lifeguard","surgeon","accountant"],
    hard: ["cartographer","sommelier","cryptographer","taxidermist","puppeteer","calligrapher","archaeologist","seismologist","stenographer","cobbler","blacksmith","perfumer","horologist","bookbinder","glassblower","falconer","cooper","beekeeper","ventriloquist","auctioneer"]
  },
  nature: {
    easy: ["sun","moon","star","tree","flower","cloud","rain","snow","fire","leaf","grass","river","ocean","rock","mountain","wind","beach","rainbow","lake","sand"],
    medium: ["waterfall","tornado","volcano","glacier","cactus","mushroom","seashell","iceberg","canyon","meadow","swamp","valley","reef","cliff","crater","oasis","comet","eclipse","aurora","whirlpool"],
    hard: ["stalactite","geyser","fjord","savanna","tundra","peninsula","archipelago","mangrove","tributary","estuary","bioluminescence","constellation","supernova","nebula","permafrost","sinkhole","monsoon","tsunami","crevasse","caldera"]
  }
};

let currentCat = "random";
let currentDiff = "medium";
let recent = [];
let round = 0;
let currentWord = "";
let isHidden = false;

let playerCount = 2;
let players = [
  {name:"Player 1", score:0},
  {name:"Player 2", score:0},
  {name:"Player 3", score:0},
  {name:"Player 4", score:0},
];

const wordOut = document.getElementById("wordOut");
const cardTag = document.getElementById("cardTag");
const stamp = document.getElementById("stamp");
const meta = document.getElementById("meta");
const genBtn = document.getElementById("genBtn");
const hideBtn = document.getElementById("hideBtn");
const playersEl = document.getElementById("players");
const playerCountEl = document.getElementById("playerCount");

document.querySelectorAll(".chip").forEach(c=>{
  c.addEventListener("click", ()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
    c.classList.add("active");
    currentCat = c.dataset.cat;
    cardTag.textContent = c.textContent.trim();
  });
});

document.querySelectorAll(".diff").forEach(d=>{
  d.addEventListener("click", ()=>{
    document.querySelectorAll(".diff").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    currentDiff = d.dataset.diff;
  });
});

function pickWord(){
  let pool;
  let labelCat = currentCat;
  if(currentCat === "random"){
    const cats = Object.keys(WORDS);
    labelCat = cats[Math.floor(Math.random()*cats.length)];
    pool = WORDS[labelCat][currentDiff];
  } else {
    pool = WORDS[currentCat][currentDiff];
  }
  let candidate;
  let tries = 0;
  do {
    candidate = pool[Math.floor(Math.random()*pool.length)];
    tries++;
  } while(recent.includes(candidate) && tries < 12);
  recent.push(candidate);
  if(recent.length > 8) recent.shift();
  return {word: candidate, cat: labelCat};
}

function generate(){
  const {word, cat} = pickWord();
  round++;
  currentWord = word;
  isHidden = false;
  hideBtn.textContent = "👁️";
  wordOut.classList.remove("empty","pop","hidden-word");
  void wordOut.offsetWidth;
  wordOut.textContent = word;
  wordOut.classList.add("pop");
  stamp.textContent = `${cat} · ${currentDiff}`;
  meta.textContent = `Round ${round}`;
}

function toggleHide(){
  if(!currentWord) return;
  isHidden = !isHidden;
  if(isHidden){
    wordOut.textContent = "• • • • •";
    wordOut.classList.add("hidden-word");
    hideBtn.textContent = "🙈";
  } else {
    wordOut.textContent = currentWord;
    wordOut.classList.remove("hidden-word");
    hideBtn.textContent = "👁️";
  }
}

genBtn.addEventListener("click", generate);
hideBtn.addEventListener("click", toggleHide);
document.addEventListener("keydown", (e)=>{
  if(e.code === "Space" && document.activeElement.tagName !== "INPUT"){
    e.preventDefault();
    generate();
  }
});

function renderPlayers(){
  playersEl.innerHTML = "";
  const active = players.slice(0,playerCount);
  const maxScore = Math.max(...active.map(p=>p.score));
  const hasLead = maxScore > 0;
  active.forEach((p,i)=>{
    const isLeader = hasLead && p.score === maxScore;
    const row = document.createElement("div");
    row.className = "player" + (isLeader ? " leader" : "");
    row.dataset.i = i;
    row.innerHTML = `
      ${isLeader ? '<span class="crown">👑</span>' : ''}
      <div class="player-color"></div>
      <input class="player-name" value="${p.name.replace(/"/g,'&quot;')}" data-i="${i}" maxlength="14"/>
      <button class="score-btn minus" data-i="${i}" data-act="minus" aria-label="Minus point">−</button>
      <div class="score">${p.score}</div>
      <button class="score-btn plus" data-i="${i}" data-act="plus" aria-label="Plus point">+</button>
    `;
    playersEl.appendChild(row);
  });
  playersEl.querySelectorAll(".score-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      const i = +b.dataset.i;
      if(b.dataset.act === "plus") players[i].score++;
      else players[i].score = Math.max(0, players[i].score - 1);
      renderPlayers();
    });
  });
  playersEl.querySelectorAll(".player-name").forEach(inp=>{
    inp.addEventListener("input",(e)=>{
      const i = +e.target.dataset.i;
      players[i].name = e.target.value || `Player ${i+1}`;
    });
    inp.addEventListener("focus",(e)=>e.target.select());
  });
  playerCountEl.textContent = playerCount;
}

document.getElementById("morePlayers").addEventListener("click",()=>{
  if(playerCount < 4){ playerCount++; renderPlayers(); }
});
document.getElementById("lessPlayers").addEventListener("click",()=>{
  if(playerCount > 1){ playerCount--; renderPlayers(); }
});
const resetBtn = document.getElementById("resetBtn");
let resetArmed = false;
let resetTimer = null;
const resetOriginalText = resetBtn.textContent;
resetBtn.addEventListener("click",()=>{
  if(!resetArmed){
    resetArmed = true;
    resetBtn.textContent = "Tap again to confirm";
    resetBtn.style.background = "var(--pink)";
    resetBtn.style.color = "var(--cream)";
    resetTimer = setTimeout(()=>{
      resetArmed = false;
      resetBtn.textContent = resetOriginalText;
      resetBtn.style.background = "";
      resetBtn.style.color = "";
    }, 3000);
    return;
  }
  clearTimeout(resetTimer);
  resetArmed = false;
  resetBtn.textContent = resetOriginalText;
  resetBtn.style.background = "";
  resetBtn.style.color = "";
  players.forEach(p=>p.score=0);
  round = 0;
  meta.textContent = "Round 0";
  renderPlayers();
});

renderPlayers();
</script>
</body>
</html>
